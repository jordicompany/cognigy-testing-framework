<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#4F46E5"/>
  <!-- Clipboard body -->
  <rect x="9" y="10" width="14" height="16" rx="2" fill="white" opacity="0.15"/>
  <rect x="9" y="10" width="14" height="16" rx="2" stroke="white" stroke-width="1.5"/>
  <!-- Clipboard top clip -->
  <rect x="13" y="8" width="6" height="4" rx="1" fill="#4F46E5" stroke="white" stroke-width="1.5"/>
  <!-- Check lines -->
  <line x1="12" y1="16" x2="20" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="19.5" x2="17" y2="19.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small checkmark -->
  <polyline points="18,18.5 19.5,20.5 22,17.5" stroke="#A5F3FC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
